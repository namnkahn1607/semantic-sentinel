syntax = "proto3";

package proto;

option go_package = "strix/gateway/pb";

enum CacheState {
  CACHE_STATE_UNSPECIFIED = 0;
  CACHE_STATE_HIT = 1;
  CACHE_STATE_MISS = 2;
  CACHE_STATE_PENDING = 3;
}

message CheckCacheRequest {
  bytes prompt = 1;
}

message CheckCacheResponse {
  CacheState check_state = 1;
  int32 node_id = 2; // -1 if HIT, otherwise > -1
  bytes cached_payload = 3; // empty if MISS or PENDING_HIT
}

message SetCacheRequest {
  int32 node_id = 1;
  bytes uncached_payload = 2;
}

message SetCacheResponse {
  bool success = 1;
}

service SemanticService {
  rpc CheckCache(CheckCacheRequest) returns (CheckCacheResponse); // READ
  rpc SetCache(SetCacheRequest) returns (SetCacheResponse); // WRITE
}
